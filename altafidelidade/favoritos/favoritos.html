<body id="topo">
    <!-- HEADER -->
    <header class="header">
        <button onclick="window.history.back()" class="back-btn" aria-label="Voltar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6" />
            </svg>
        </button>

    <!-- TÍTULO FAVORITOS -->
    <div class="fav-header">
        <div class="fav-title">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="#F04438" aria-hidden="true">
                <path d="M12.1 8.64l-.1.1-.1-.1C10.14 6.8 7.4 6.75 5.6 8.56c-1.82 1.82-1.78 4.72.1 6.6l5.83 5.83c.26.26.68.26.94 0l5.83-5.83c1.88-1.88 1.92-4.78.1-6.6-1.8-1.81-4.54-1.76-6.3.08z" />
            </svg>
            <h1>Favoritos</h1>
        </div>
        <button class="share-btn" aria-label="Compartilhar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3" /><circle cx="6" cy="12" r="3" /><circle cx="18" cy="19" r="3" />
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
            </svg>
        </button>
    </div>

    <!-- Lista dinâmica de favoritos (preenchida pelo scriptFavoritos.js) -->
    <div id="lista-favoritos" class="lista-favoritos"></div>

                    <div class="mini-card__precos">
                        <span class="mini-card__atual">R$59,90</span>

                    </div>
                    <div class="mini-card__acoes">
                        <button class="icon-btn heart" aria-label="Favoritar">

                                <circle cx="9" cy="20" r="1.6" fill="currentColor" />
                                <circle cx="17" cy="20" r="1.6" fill="currentColor" />
                            </svg>
