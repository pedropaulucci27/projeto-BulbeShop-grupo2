<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Compra Recusado • Bulbe</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../pagamento e recusado/statusrecusado.css">
</head>
<body>

  <!-- HEADER -->
  <header class="appbar">
    <button class="appbar__back" aria-label="Voltar" id="btnBack">
      <img src="../pagamento e recusado/.assets/img/corner-up-left.svg" alt="">
    </button>
    <a href="/altafidelidade/home/paginicial.html"><img class="appbar__logo" id="btnLogo" src="../pagamento e recusado/.assets/img/logo-base (1).svg" alt="Bulbe"></a>
  </header>

  <main class="wrap">

    <!-- Ícone grande (check) -->
    <figure class="hero-check">
      <img src="../pagamento e recusado/.assets/img/image 27.svg" alt="Compra recusada">
    </figure>

    <!-- Banner de status -->
    <button class="status-banner status-banner--err" type="button" disabled>
      Compra Recusada!
    </button>

    <!-- Caixa Dados do pedido -->
    <section class="info-card info-card--err">
      <header class="info-card__head">
        <img src="../pagamento e recusado/.assets/img/alert-circle.svg" alt="" class="info-card__ico">
        <span class="info-card__title">Não foi possível finalizar</span>
      </header>
      <p class="info-card__text" id="orderInfo">
        Verifique os dados do seu cartão ou escolha outro método de pagamento.
      </p>
    </section>

    <!-- Ações -->
    <div class="actions actions--two">
      <button class="btn btn--ghost" id="btnTentar">Tentar novamente</button>
      <button class="btn btn--ok" id="btnInicio">Voltar para início</button>
    </div>

  </main>

  <!-- (sem footer/tabbar) -->

  <script src="../pagamento e recusado/scripts/script-recusado.js"></script>
</body>
</html>
