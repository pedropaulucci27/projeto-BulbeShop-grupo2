<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Carrinho • Bulbe</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./styleCarrinhoVazio.css">
</head>

<body>
    <header class="barra-superior">
        <a class="botao-voltar" aria-label="Voltar" href="../home/paginicial.html">
            <img src="./assets/img/corner-up-left (2).svg" alt="Voltar">
        </a>
        <a href="/altafidelidade/home/paginicial.html">
            <img class="logo-bulbe" src="./assets/img/logo.svg" alt="Bulbe">
        </a>
    </header>

    <main class="conteudo-principal">
        <section class="cabecalho-carrinho">
            <div class="lado-esquerdo-cabecalho">
                <img class="icone-carrinho" src="./assets/img/carrinho.svg" alt="">
                <h1>Carrinho</h1>
            </div>
        </section>

        <div class="carrinho-vazio">
            <img src="./assets/img/carrinhovazio.svg" alt="Carrinho vazio" class="img-vazio">
            <div class="texto-vazio">
                <img src="./assets/img/sadface.svg" alt="" class="icone-user">
                <span>O carrinho está vazio</span>
            </div>
            <a href="/altafidelidade/home/paginicial.html"
               style="display:inline-block;margin-top:16px;padding:10px 24px;
                      background:#08068D;color:#fff;border-radius:8px;
                      text-decoration:none;font-family:Poppins,sans-serif;
                      font-size:.9rem;font-weight:600;">
                Continuar comprando
            </a>
        </div>

        <div class="logo-final">
            <img src="./assets/img/logo 2.svg" alt="Bulbe — sua próxima energia">
        </div>
    </main>

    <script src="../api.js"></script>
    <script src="./script.js"></script>
</body>

</html>
