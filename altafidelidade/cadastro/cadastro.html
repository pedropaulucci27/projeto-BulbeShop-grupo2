<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta — Bulbe</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../login/login.css">
</head>
<body>
  <div class="bg-pattern"></div>

  <main class="shell">
    <section class="card">
      <a class="back-btn" onclick="history.back()" aria-label="Voltar">
        <img src="/altafidelidade/meu perfil/img/Icon.svg" alt="Voltar" width="24" height="24"
             onerror="this.replaceWith(document.createTextNode('←'))">
      </a>

      <div class="avatar-wrap">
        <img class="avatar" src="/altafidelidade/meu perfil/img/Frame 9.svg" alt="Bulbe">
        <h1 class="titulo">Crie sua conta</h1>
        <p class="subtitulo">Cadastre-se na Bulbe</p>
      </div>

      <form id="formCadastro" novalidate>
        <div class="input-group">
          <label for="nome">Nome completo:</label>
          <div class="input-wrap">
            <input id="nome" type="text" placeholder="Seu nome completo" autocomplete="name" required>
          </div>
        </div>

        <div class="input-group">
          <label for="email">E-mail:</label>
          <div class="input-wrap">
            <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" required>
          </div>
        </div>

        <div class="input-group">
          <label for="senha">Senha:</label>
          <div class="input-wrap">
            <input id="senha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
            <button type="button" class="toggle-senha" id="toggleSenha" aria-label="Mostrar senha">
              <img src="/altafidelidade/meu perfil/img/olhoicon.svg" alt="" width="20" height="20"
                   onerror="this.replaceWith(document.createTextNode('👁'))">
            </button>
          </div>
        </div>

        <p id="erroCadastro" class="erro" hidden></p>

        <button type="submit" class="btn-primary" id="btnCadastrar">Criar conta</button>
      </form>

      <p class="link-alt">
        Já tem conta? <a href="/altafidelidade/login/login.html">Entrar</a>
      </p>
    </section>
  </main>

  <script src="../api.js"></script>
  <script src="cadastro.js"></script>
</body>
</html>
