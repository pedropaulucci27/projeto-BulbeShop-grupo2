<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Araujo</title>
    <link rel="stylesheet" href="stylepaginaaraujo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>

<body>
<!-- HEADER -->
    <header class="header">
        <div class="seta-header" id="seta-btn">
            <button class="appbar__back" aria-label="Voltar" onclick="history.back()">
            <img src="/altafidelidade/pagamento1/.assets/img/corner-up-left.svg" alt="Seta para voltar">
            </button>
        </div>

        <div class="logo-header">
            <a href="/altafidelidade/home/paginicial.html"><img src="./img/logo-bulbe1.png" alt="Logo da Bulbe"></a>
        </div>
    </header>

<!-- HEADER DO AFILIADO -->
    <div class="logo-afiliado">  
        <img src="./img/logo-araujo.png" alt="Logo da Drogaria Araujo">
    </div>

<!-- BARRA DE PESQUISA -->
    <div class="barra-de-pesquisa">
        <!-- <p class="texto-barra-de-pesquisa">Buscar</p> -->
        <input type="text" id="input-pesquisa" placeholder="">
        <button class="botao-lupa" aria-label="Buscar">
            <img src="./img/lupa.png" alt="Ícone de lupa">
        </button>
    </div>

<!-- NAV BAR SCROLAVEL -->
    <div class="nav-scroll">
        <a href="#" class="nav-item" id="botao-beleza-e-cuidados">
            <img src="./img/beleza-e-cuidados.png" alt="Beleza e Cuidados">
            <span>Beleza e Cuidados</span>
        </a>

        <a href="#" class="nav-item" id="botao-infantil">
            <img src="./img/criancas.png" alt="Infantil">
            <span>Infantil</span>
        </a>

        <a href="#" class="nav-item" id="botao-medicamentos">
            <img src="./img/medicamentos.png" alt="Medicamentos">
            <span>Medicamentos</span>
        </a>
    </div>

<!-- BANNERS -->
<div class="banner-container">
    <div class="banner1"></div>
    <div class="banner2"></div>
    <div class="banner3"></div>
</div>


<!-- CARDS -->
    <main class="wrap">
        <h2 class="titulo-secao">Produtos mais vistos</h2>
        <section class="grid"> 
            <!-- Os produtos serão injetados dinamicamente via JavaScript (scripts.js) -->
        </section>
    </main>
    <script src="scripts.js"></script>
</body>

</html>
