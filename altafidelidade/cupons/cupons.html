<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cupons • Bulbe</title>
    <link rel="stylesheet" href="styleCupom.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Libertinus+Mono&family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>


<body>
    <!-- HEADER -->
    <header class="header">
        <button class="back-btn" aria-label="Voltar"><span class="arrow">←</span></button>
        <a href="/altafidelidade/home/paginicial.html"><img src="./logobulbe.jpeg" alt="Bulbe" class="logo"></a>
    </header>

    <div class="app">
        <!-- BUSCA -->
        <div class="search">
            <input id="search" type="search" placeholder="Digite o cupom" autocomplete="off" />
        </div>

        <!-- LISTA — preenchida pelo scriptCupom.js via API -->
        <main class="list" id="couponList">
            <p class="cupons-loading" id="cuponsLoading">Carregando cupons...</p>
        </main>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <a href="/altafidelidade/home/paginicial.html"><img src="./logobulbe.jpeg" alt="Bulbe" class="footer-logo"></a>
            <p class="footer-text">sua próxima energia</p>
        </div>
    </footer>

    <!-- TOAST -->
    <div class="toast-wrap" id="toastWrap" aria-live="polite" aria-atomic="true">
        <div class="toast" id="toast">
            <button class="close" id="toastClose" aria-label="Fechar">✕</button>
            <div class="head" id="toastTitle"></div>
            <div class="body">
                <div style="font-size:1.25rem;">⚠️</div>
                <div>
                    <strong id="toastMsg"></strong>
                    <p id="toastSub"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="../api.js"></script>
    <script src="../auth-header.js"></script>
    <script src="scriptCupom.js" defer></script>
    <script src="../api.js"></script>
</body>

</html>
